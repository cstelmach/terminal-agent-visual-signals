TAVS_SESSION_ICONS=(
    "ЁЯРЩ" "ЁЯР│" "ЁЯк▓" "ЁЯжЙ" "ЁЯРв" "ЁЯжК" "ЁЯРШ" "ЁЯжЛ" "ЁЯРм" "ЁЯжС"
