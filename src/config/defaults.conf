# Standard:  ╞О[тАв тАв]E ЁЯЯа +2 ЁЯжК ~/proj      (text eyes + separate icons)
# Compact:   ╞О[ЁЯЯз ЁЯзА]E +2 ЁЯжК ~/proj       (state + context eyes, count outside)
#
# Options:
#   TAVS_FACE_MODE             - "standard" | "compact" (default)
#   TAVS_COMPACT_THEME         - "semantic" | "circles" | "squares" (default) | "mixed"
#   TAVS_COMPACT_CONTEXT_EYE   - "mirror" (default) | "true" | "false"
