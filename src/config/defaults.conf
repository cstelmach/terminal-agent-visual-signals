# Block Characters вАФ 8-stage вАФ for {CONTEXT_BAR_V}
# Lookup: index = pct * 7 / 100 (clamped to 0-7)
TAVS_CONTEXT_BLOCKS=("вЦБ" "вЦВ" "вЦГ" "вЦД" "вЦЕ" "вЦЖ" "вЦЗ" "вЦИ")

# Braille Characters вАФ 7-stage (bottom to top fill) вАФ for {CONTEXT_BRAILLE}
