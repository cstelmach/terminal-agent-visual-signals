# Claude: Pincer style - ╞О[eyes]E
CLAUDE_SPINNER_FACE_FRAME='╞О[{L} {R}]E'

# Gemini: Bear style - ╩Хeyesс┤еeyes╩Ф
GEMINI_SPINNER_FACE_FRAME='╩Х{L}с┤е{R}╩Ф'

