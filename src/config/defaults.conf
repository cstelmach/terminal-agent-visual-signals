#   TAVS_FACE_MODE             - "standard" (default) | "compact"
#   TAVS_COMPACT_THEME         - "semantic" | "circles" | "squares" (default) | "mixed"
#   TAVS_COMPACT_CONTEXT_EYE   - "true" (default) | "false" вАФ context fill in right eye
