# Number Emoji Scale тАФ 11-stage (10% steps) тАФ for {CONTEXT_NUMBER}
# Lookup: index = pct / 10 (clamped to 0-10)
TAVS_CONTEXT_NUMBERS=(
    "0я╕ПтГг" "1я╕ПтГг" "2я╕ПтГг" "3я╕ПтГг" "4я╕ПтГг"
    "5я╕ПтГг" "6я╕ПтГг" "7я╕ПтГг" "8я╕ПтГг" "9я╕ПтГг" "ЁЯФЯ"
)

# Block Characters тАФ 8-stage тАФ for {CONTEXT_BAR_V}
# Lookup: index = pct * 7 / 100 (clamped to 0-7)
TAVS_CONTEXT_BLOCKS=("тЦБ" "тЦВ" "тЦГ" "тЦД" "тЦЕ" "тЦЖ" "тЦЗ" "тЦИ")

# Braille Characters тАФ 7-stage (bottom to top fill) тАФ for {CONTEXT_BRAILLE}
